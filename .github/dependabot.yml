version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/actions/nordvpn-es"
      - "/actions/nordvpn-es/disconnect"
      - "/actions/nordvpn-us"
      - "/actions/nordvpn-us/disconnect"
      - "/actions/nordvpn-fr"
      - "/actions/nordvpn-fr/disconnect"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    groups:
      actions:
        patterns: ["*"]
