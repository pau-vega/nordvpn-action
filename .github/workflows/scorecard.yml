name: scorecard

on:
  branch_protection_rule:
  schedule:
    # Saturday 03:00 UTC — off-peak, avoids contention with the Monday 08:00 UTC self-test cron.
    - cron: '0 3 * * 6'
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Required for uploading the SARIF results to the code-scanning dashboard.
      security-events: write
      # Required for GitHub's OIDC token authentication used by `publish_results`.
      id-token: write
      contents: read
      # Required for retrieving repository metadata such as branch-protection rules.
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # `publish_results` requires `id-token: write` (above) and writes to the
          # public OpenSSF Scorecard dashboard so the badge in README resolves.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning dashboard
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: results.sarif
